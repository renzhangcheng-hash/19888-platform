app = "19888-platform"
primary_region = "hkg"

[build]
  builder = "node"

[env]
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[http_service]
  internal_port = 8080
  force_https = true
