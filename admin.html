<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>19888 管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0D;--surface:#1A1A1A;--border:#2A2A2A;--text:#F5F5F5;--text2:#999;--text3:#666;--accent:#E53935;--accent2:#FF5252;--green:#00C853;--orange:#FF6D00;--shadow:0 2px 12px rgba(0,0,0,0.4)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:1100px;margin:0 auto}
h1{color:var(--accent);font-size:20px;margin-bottom:16px}
h2{font-size:15px;color:var(--text);margin:18px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px}
.stat-card .label{font-size:11px;color:var(--text3)}.stat-card .value{font-size:22px;font-weight:900;color:var(--accent);margin-top:4px}
.tab-nav{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab-nav button{padding:7px 13px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px}
.tab-nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
th{background:#222;padding:9px 10px;text-align:left;font-size:11px;color:var(--text3);font-weight:600}
td{padding:9px 10px;font-size:12px;border-top:1px solid var(--border);color:var(--text2)}
.btn{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600}
.btn-ok{background:var(--accent);color:#fff}.btn-warn{background:var(--orange);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-muted{background:#333;color:var(--text2)}.btn-add{background:var(--accent);color:#fff;padding:8px 18px;font-size:12px}
.login-box{max-width:360px;margin:60px auto;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:30px;text-align:center}
.login-box label{display:block;text-align:left;font-size:12px;color:var(--text2);margin-bottom:4px}
.login-box input{width:100%;padding:11px;margin-bottom:12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px}
.login-box button{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer}
.login-box p{font-size:11px;color:var(--text3);margin-top:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:100%;max-width:480px}
.modal-header{padding:14px 16px;background:var(--accent);color:#fff;font-weight:700;font-size:14px}
.modal-body{padding:16px;max-height:60vh;overflow-y:auto}
.modal-body input,.modal-body select{width:100%;padding:9px 10px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px}
.modal-body label{font-size:11px;color:var(--text2);display:block;margin:6px 0 3px}
.modal-footer{padding:10px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)}
.toast{position:fixed;top:16px;right:16px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:6px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
.toast.show{opacity:1}.toast.error{border-color:var(--accent);color:var(--accent)}
.status-ok{color:var(--green)}.status-warn{color:var(--orange)}.status-bad{color:var(--accent)}.empty{text-align:center;padding:30px;color:var(--text3)}
<script src="js/vendor/purify.min.js"></script>
<script src="js/app.js"></script>
</head>
<body>

<div class="login-box" id="loginBox">
  <h1>🏆 19888 管理后台</h1>
  <label>管理员密码</label>
  <input type="password" id="loginPass" placeholder="输入管理密码">
  <button onclick="doLogin()">进入后台</button>
  <p>管理员请使用初始密码登录（见服务器控制台输出）</p>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <h1>🏆 19888 管理后台</h1>
    <button class="btn btn-muted" onclick="doLogout()">退出</button>
  </div>

  <div class="stats" id="statsGrid"></div>

  <div class="tab-nav">
    <button class="active" onclick="switchTab('users')">👥 用户</button>
    <button onclick="switchTab('matches')">📅 赛事</button>
    <button onclick="switchTab('bets')">📋 订单</button>
    <button onclick="switchTab('deposits')">📥 充值</button>
    <button onclick="switchTab('withdraws')">📤 提现</button>
    <button onclick="switchTab('agents')">🤝 代理</button>
    <button onclick="switchTab('vip')">👑 VIP</button>
    <button onclick="switchTab('finance')">📊 财务</button>
    <button onclick="switchTab('risk')">🛡 风控</button>
    <button onclick="switchTab('settle')">⚡ 结算</button>
    <button onclick="switchTab('aipool')">🤖 AI池</button>
    <button onclick="switchTab('teams')">🏁 球队</button>
    <button onclick="switchTab('verify')">✅ 验证</button>
  </div>

  <div id="tab-users">
    <h2>用户管理</h2>
    <table><thead><tr><th>地址</th><th>昵称</th><th>余额</th><th>冻结-投注</th><th>冻结-AI</th><th>AI托管</th><th>VIP</th><th>注册时间</th></tr></thead>
    <tbody id="usersTbody"></tbody></table>
  </div>

  <div id="tab-matches" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0;border:none">赛事管理</h2>
      <button class="btn btn-add" onclick="openMatchModal('add')">+ 添加比赛</button>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px">
      <h3 style="font-size:13px;margin-bottom:10px">➕ 快速创建比赛</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">联赛</label><input id="cmLeague" placeholder="世界杯" style="width:100px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">主队</label><input id="cmHome" placeholder="主队" style="width:120px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">客队</label><input id="cmAway" placeholder="客队" style="width:120px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">时间</label><input id="cmTime" type="datetime-local" style="width:180px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <button class="btn btn-green" onclick="doCreateMatch()">创建</button>
      </div>
      <div id="cmResult" style="margin-top:8px;font-size:11px;color:var(--text3)"></div>
    </div>
    <table><thead><tr><th>ID</th><th>联赛</th><th>主队</th><th>客队</th><th>时间</th><th>主胜</th><th>平</th><th>客胜</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="matchesTbody"></tbody></table>
  </div>

  <div id="tab-bets" style="display:none">
    <h2>订单管理</h2>
    <table><thead><tr><th>ID</th><th>用户</th><th>赛事/球队</th><th>类型</th><th>金额</th><th>赔率</th><th>状态</th><th>操作</th></tr></thead>
    <tbody id="betsTbody"></tbody></table>
  </div>

  <div id="tab-deposits" style="display:none">
    <h2>充值审核</h2>
    <table><thead><tr><th>ID</th><th>用户</th><th>金额</th><th>TxHash</th><th>状态</th><th>时间</th></tr></thead>
    <tbody id="depositsTbody"></tbody></table>
  </div>

  <div id="tab-withdraws" style="display:none">
    <h2>提现审核</h2>
    <table><thead><tr><th>ID</th><th>用户</th><th>金额</th><th>目标地址</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
    <tbody id="withdrawsTbody"></tbody></table>
  </div>

  <div id="tab-agents" style="display:none">
    <h2>代理管理</h2>
    <div id="agentStats" style="margin-bottom:12px"></div>
    <table><thead><tr><th>代理地址</th><th>邀请数</th><th>交易额</th><th>佣金</th><th>等级</th><th>加入时间</th></tr></thead>
    <tbody id="agentsTbody"></tbody></table>
  </div>

  <div id="tab-vip" style="display:none">
    <h2>VIP管理</h2>
    <table><thead><tr><th>等级</th><th>名称</th><th>累计投注要求</th><th>返佣%</th><th>赔率加成%</th><th>提现限额</th></tr></thead>
    <tbody id="vipTbody"></tbody></table>
  </div>

  <div id="tab-finance" style="display:none">
    <h2>财务报表</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="stat-card"><div class="label">资金池总额</div><div class="value" id="finPoolBal">--</div></div>
      <div class="stat-card"><div class="label">平台PnL</div><div class="value" id="finPnl">--</div></div>
      <div class="stat-card"><div class="label">用户总数</div><div class="value" id="finUsers">--</div></div>
      <div class="stat-card"><div class="label">未结投注</div><div class="value" id="finPending">--</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <label style="font-size:11px;color:var(--text2)">日期:</label>
      <input type="date" id="finDate" style="width:auto;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px" onchange="loadFinance()">
      <button class="btn btn-ok" onclick="loadFinance()">查询日报</button>
    </div>
    <table><thead><tr><th>指标</th><th>数值</th></tr></thead>
    <tbody id="financeTbody"></tbody></table>
    <div style="margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px">
      <h3 style="font-size:13px;margin-bottom:10px">💰 每日财务报告</h3>
      <div id="dailyReportContent" class="empty">选择日期查询...</div>
    </div>
    <div style="margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px">
      <h3 style="font-size:13px;margin-bottom:10px">💳 手动充值</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">钱包地址</label><input id="mdAddr" placeholder="0x..." style="width:220px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">金额 (USDT)</label><input id="mdAmount" type="number" step="0.01" min="0.01" placeholder="10.00" style="width:100px;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"></div>
        <button class="btn btn-green" onclick="doManualDeposit()">确认充值</button>
      </div>
      <div id="mdResult" style="margin-top:8px;font-size:11px;color:var(--text3)"></div>
    </div>
  </div>

  <div id="tab-risk" style="display:none">
    <h2>风控系统</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px" id="riskStatus"></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px">
      <h3 style="font-size:13px;margin-bottom:10px">熔断控制</h3>
      <button class="btn btn-warn" id="circuitBtn" onclick="toggleCircuitBreaker()">触发熔断</button>
      <span style="font-size:11px;color:var(--text3);margin-left:8px" id="circuitStatus">状态: 正常</span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px">
      <h3 style="font-size:13px;margin-bottom:10px">风控配置</h3>
      <table><thead><tr><th>参数</th><th>当前值</th><th>操作</th></tr></thead>
      <tbody id="riskConfigTbody"></tbody></table>
    </div>
    <div style="margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px">
      <h3 style="font-size:13px;margin-bottom:10px">🛡 风控告警</h3>
      <table><thead><tr><th>时间</th><th>类型</th><th>严重度</th><th>消息</th></tr></thead>
      <tbody id="riskAlertsTbody"><tr><td colspan="4" class="empty">加载中...</td></tr></tbody></table>
    </div>
  </div>

  <div id="tab-settle" style="display:none">
    <h2>比赛结算</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px">
      <h3 style="font-size:13px;margin-bottom:10px">结算比赛</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">比赛</label><select id="settleMatch" style="padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;min-width:180px"><option value="">-- 选择 --</option></select></div>
        <div><label style="font-size:10px;color:var(--text2);display:block;margin-bottom:3px">比分</label><select id="settleScore" style="padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px"><option value="">-- 比分 --</option><option>0:0</option><option>0:1</option><option>0:2</option><option>0:3</option><option>1:0</option><option>1:1</option><option>1:2</option><option>1:3</option><option>2:0</option><option>2:1</option><option>2:2</option><option>2:3</option><option>3:0</option><option>3:1</option><option>3:2</option><option>3:3</option><option>主4+</option><option>客4+</option></select></div>
        <button class="btn btn-ok" onclick="doSettleMatch()">结算</button>
      </div>
      <div id="settleResult" style="margin-top:10px;font-size:12px"></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px">
      <h3 style="font-size:13px;margin-bottom:10px;color:var(--orange)">⚠️ 重置赛事数据</h3>
      <p style="font-size:11px;color:var(--text2);margin-bottom:10px">从seed文件重新加载所有104场赛事</p>
      <button class="btn btn-warn" onclick="resetMatches()">🔄 重置全部赛事</button>
      <div id="resetResult" style="margin-top:8px;font-size:12px"></div>
    </div>
  </div>

  <div id="tab-aipool" style="display:none">
    <h2>🤖 AI托管池</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px" id="aipoolStats"></div>
    <h2>AI托管投注记录</h2>
    <table><thead><tr><th>ID</th><th>用户</th><th>金额</th><th>预期赢</th><th>状态</th><th>时间</th></tr></thead>
    <tbody id="aipoolTbody"><tr><td colspan="6" class="empty">加载中...</td></tr></tbody></table>
  </div>

  <div id="tab-teams" style="display:none">
    <h2>🏁 冠军球队管理</h2>
    <table><thead><tr><th>ID</th><th>球队名称</th><th>Flag</th><th>冠军赔率</th><th>亚军赔率</th><th>操作</th></tr></thead>
    <tbody id="teamsTbody"><tr><td colspan="6" class="empty">加载中...</td></tr></tbody></table>
  </div>

  <div id="tab-verify" style="display:none">
    <h2>✅ 合约验证状态</h2>
    <div id="verifyContent" class="empty">加载中...</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header" id="modalHeader">比赛编辑</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-muted" onclick="closeModal()">取消</button>
      <button class="btn btn-ok" onclick="saveMatchModal()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const DEFAULT_API = 'https://one9888-api.onrender.com/api/admin';
function resolveApi() {
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return '/api/admin';
  return DEFAULT_API;
}
const API = resolveApi();
let JWT = '';

// ===== AUTH =====
async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  try {
    const r = await fetch(API + '/login', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:'admin',password:pass})
    });
    const d = await r.json();
    if (d.code===0 && d.data && d.data.token) {
      JWT = d.data.token;
      document.getElementById('loginBox').style.display='none';
      const db = document.getElementById('dashboard');
      db.style.display='block';
      loadAll();
      // Force visibility in case any load sub-function resets it
      setTimeout(function(){ document.getElementById('dashboard').style.display='block'; }, 20000);
    } else { toast(d.msg||'密码错误','error'); }
  } catch(e) { toast('网络错误','error'); }
}

function doLogout() { JWT=''; document.getElementById('dashboard').style.display='none'; document.getElementById('loginBox').style.display='block'; }

async function apiFetch(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  if (JWT) opts.headers['Authorization'] = 'Bearer ' + JWT;
  const r = await fetch(url, opts);
  return r.json();
}

// ===== LOAD ALL =====
function loadAll() { loadStats(); loadUsers(); loadMatches(); loadBets(); loadDeposits(); loadWithdraws(); loadAgents(); loadVIP(); loadRisk(); loadSettleSelects(); loadRiskAlerts(); loadTeams(); loadAIPool(); }

// ===== STATS =====
async function loadStats() {
  try {
    const [users, bets, pool, risk] = await Promise.all([
      apiFetch(API+'/users'), apiFetch(API+'/bets'),
      apiFetch(DEFAULT_API.replace('/admin','')+'/finance/pool-status'), apiFetch(API+'/risk/config')
    ]);
    const uData = users.data || [];
    const bData = bets.data || [];
    const pData = pool.data || {};
    const totalBet = bData.reduce((s,b)=>s+(b.amount||0),0);
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="label">用户数</div><div class="value">${uData.length}</div></div>
      <div class="stat-card"><div class="label">总投注</div><div class="value">${bData.length}</div></div>
      <div class="stat-card"><div class="label">总流水</div><div class="value">${totalBet.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">资金池</div><div class="value">${(pData.total_balance||0).toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">进行中</div><div class="value">${bData.filter(b=>b.status==='pending').length}</div></div>`;
  } catch(e) {}
}

// ===== USERS =====
async function loadUsers() {
  try {
    const r = await apiFetch(API+'/users');
    const data = r.data || [];
    document.getElementById('usersTbody').innerHTML = data.length ? data.map(u=>`<tr>
      <td style="font-size:10px">${(u.address||'').substring(0,14)}...</td>
      <td>${u.nickname||'--'}</td>
      <td class="status-ok">${(u.balance||0).toFixed(2)}</td>
      <td>${(u.frozen_bet||0).toFixed(2)}</td>
      <td>${(u.frozen_ai||0).toFixed(2)}</td>
      <td>${u.ai_active?'<span class="status-ok">激活</span>':'--'}</td>
      <td>Lv${u.vip_level||0}</td>
      <td style="font-size:10px">${u.created_at?new Date(u.created_at).toLocaleDateString():'--'}</td>
    </tr>`).join('') : '<tr><td colspan="8" class="empty">暂无用户</td></tr>';
  } catch(e) {}
}

// ===== MATCHES =====
async function loadMatches() {
  try {
    const r = await apiFetch(API+'/matches');
    const data = r.data || [];

        <tr><td>智能合约验证</td><td class="status-ok">✅ 已部署</td></tr>
        <tr><td>JWT 身份验证</td><td class="status-ok">✅ 已认证</td></tr>
        <tr><td>API 服务</td><td class="status-ok">✅ 运行中</td></tr>
      </tbody></table>`;
  } catch(e) { document.getElementById('verifyContent').innerHTML = '<div class="stat-card" style="max-width:300px;margin:0 auto"><div class="label">验证失败</div><div class="value" style="color:var(--accent);font-size:14px">❌ 请重新登录</div></div>'; }
}

// ===== REVIEW WITHDRAWAL =====
async function doReviewWithdrawal(id, action) {
  if (!confirm('确认'+(action==='approve'?'批准':'拒绝')+'此提现？')) return;
  try {
    const r = await apiFetch(API+'/withdrawals/review', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({withdraw_id:id, action:action})
    });
    if (r.code===0) { toast(r.msg||(action==='approve'?'已批准':'已拒绝')); loadWithdraws(); loadStats(); }
    else toast(r.msg||'操作失败','error');
  } catch(e) { toast('网络错误','error'); }
}

// ===== MATCH EDITOR =====
let editData=null;
function openMatchModal(mode, id) {
  editData = mode==='edit'?id:null;
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('modalBody').innerHTML = `
    <label>联赛</label><input id="f-league" value="世界杯">
    <label>主队</label><input id="f-home" value="">
    <label>客队</label><input id="f-away" value="">
    <label>时间</label><input id="f-time" type="datetime-local" value="${new Date().toISOString().slice(0,16)}">
    <label>主胜赔率</label><input id="f-oh" type="number" step="0.01" value="2.00">
    <label>平局赔率</label><input id="f-od" type="number" step="0.01" value="3.00">
    <label>客胜赔率</label><input id="f-oa" type="number" step="0.01" value="3.50">`;
}

async function saveMatchModal() {
  const body = {
    league:document.getElementById('f-league').value,
    home:document.getElementById('f-home').value,
    away:document.getElementById('f-away').value,
    match_time:document.getElementById('f-time').value.replace('T',' ')+':00',
    odds_home:parseFloat(document.getElementById('f-oh').value),
    odds_draw:parseFloat(document.getElementById('f-od').value),
    odds_away:parseFloat(document.getElementById('f-oa').value)
  };
  try {
    const r = await apiFetch(API+'/matches', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (r.code===0) { toast('已保存'); closeModal(); loadMatches(); loadSettleSelects(); }
    else toast(r.msg||'保存失败','error');
  } catch(e) { toast('网络错误','error'); }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab-nav button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(d=>d.style.display='none');
  const btn = Array.from(document.querySelectorAll('.tab-nav button')).find(b=>b.textContent.includes({users:'用户',matches:'赛事',bets:'订单',deposits:'充值',withdraws:'提现',agents:'代理',vip:'VIP',finance:'财务',risk:'风控',settle:'结算',aipool:'AI池',teams:'球队',verify:'验证'}[tab]));
  if (btn) btn.classList.add('active');
  const div = document.getElementById('tab-'+tab);
  if (div) div.style.display='block';
  if (tab==='finance') loadFinance();
  if (tab==='aipool') loadAIPool();
  if (tab==='teams') loadTeams();
  if (tab==='verify') loadVerify();
  if (tab==='withdraws') loadWithdraws();
}

// ===== TOAST =====
let _toastTimer;
function toast(msg, cls) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast '+(cls||'');
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
</script>
