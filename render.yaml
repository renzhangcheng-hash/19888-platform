services:
  - type: web
    name: 19888-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/status
    envVars:
      - key: JWT_SECRET
        value: 19888-prod-change-me
      - key: ADMIN_PASSWORD
        value: 19888admin
