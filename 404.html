<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - 页面未找到 | 19888</title>
  <meta name="description" content="您访问的页面不存在，请返回首页。">
  <meta name="theme-color" content="#667eea">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F0F2F5'/><text x='50' y='65' text-anchor='middle' font-size='44' font-weight='900' fill='%23764ba2' font-family='Arial'>19888</text></svg>">
  <style>
    :root {
      --accent: #667eea;
      --accent-deep: #764ba2;
      --accent-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg: #F0F2F5;
      --surface: #FFFFFF;
      --text: #1A1A2E;
      --text2: #555770;
      --text3: #8E90A6;
      --radius: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #8B9CF7;
        --accent-deep: #A78BFA;
        --accent-grad: linear-gradient(135deg, #8B9CF7 0%, #A78BFA 100%);
        --bg: #0F0F1A;
        --surface: #1A1A2E;
        --text: #E8E8F0;
        --text2: #9A9AB0;
        --text3: #6A6A80;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .error-code {
      font-size: clamp(72px, 20vw, 120px);
      font-weight: 900;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-icon {
      font-size: clamp(48px, 12vw, 72px);
      margin-bottom: 16px;
    }
    .error-title {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text);
    }
    .error-desc {
      font-size: clamp(13px, 3.5vw, 15px);
      color: var(--text2);
      max-width: 360px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-grad);
      color: #fff;
      padding: 14px 32px;
      border-radius: 28px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(102,126,234,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(102,126,234,0.4);
    }
    .btn-home:active {
      transform: scale(0.96);
    }
    .btn-home:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="error-icon">🔍</div>
  <div class="error-code">404</div>
  <div class="error-title">页面未找到</div>
  <div class="error-desc">
    您访问的页面不存在或已被移除。<br>
    请检查网址是否正确，或返回首页继续浏览。
  </div>
  <a href="/" class="btn-home" aria-label="返回首页">🏠 返回首页</a>
</body>
</html>
